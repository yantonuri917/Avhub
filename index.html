<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gofile.mom</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        body {
            background-color: #0b0e14;
            color: #d1d5db;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Navigasi */
        .navbar {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding: 1rem 1.5rem;
            max-width: 80rem;
            margin: 0 auto;
            width: 100%;
        }

        /* Container Utama */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Spinner Gofile Asli (SVG Animation) */
        .gofile-spinner-svg {
            animation: rotate 2s linear infinite;
            width: 50px;
            height: 50px;
        }

        .gofile-spinner-svg circle {
            stroke: #3b82f6;
            stroke-linecap: round;
            animation: dash 1.5s ease-in-out infinite;
        }

        @keyframes rotate {
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes dash {
            0% {
                stroke-dasharray: 1, 150;
                stroke-dashoffset: 0;
            }
            50% {
                stroke-dasharray: 90, 150;
                stroke-dashoffset: -35;
            }
            100% {
                stroke-dasharray: 90, 150;
                stroke-dashoffset: -124;
            }
        }

        /* Tombol Menu Biru (Garis Tiga dibungkus Biru) */
        .menu-btn-blue {
            background-color: #1e88e5; /* Biru Gofile */
            color: white;
            padding: 0.6rem;
            border-radius: 0.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .menu-btn-blue:hover {
            background-color: #1976d2;
        }

        .menu-btn-blue:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <!-- Navigasi Menu Atas -->
    <nav class="navbar">
        <!-- Tombol Garis Tiga dibungkus warna Biru -->
        <div class="menu-btn-blue">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </div>
    </nav>

    <!-- Area Utama -->
    <main class="main-content">
        <!-- Spinner Kembali ke posisi bersih (tanpa bungkus) -->
        <svg class="gofile-spinner-svg" viewBox="0 0 50 50">
            <circle cx="25" cy="25" r="20" fill="none" stroke-width="4"></circle>
        </svg>
        <p class="mt-8 text-[11px] text-gray-500 font-medium uppercase tracking-[0.4em]"></p>
    </main>

    <!-- Footer Sederhana -->
    <footer class="py-6 text-center text-gray-600 text-[11px]">
        <p>WOJTEK SAS © 2026, made with ❤️ by Gofile Team</p>
    </footer>
